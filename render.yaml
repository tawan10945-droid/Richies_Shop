services:
  # ---------------------------------------------
  # 1. Backend Web Service (Node.js + Prisma)
  # ---------------------------------------------
  - type: web
    name: shop-backend-api
    env: node
    region: singapore 
    plan: free 
    rootDir: backend 
    buildCommand: "npm install && npx prisma generate && npm run prisma seed"
    startCommand: "npm run start"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000 

  # ---------------------------------------------
  # 2. Frontend Static Site (Vue.js + Vite)
  # ---------------------------------------------
  - type: web
    name: shop-frontend-ui
    env: static 
    # ลบ region: singapore ออกแล้ว
    # ลบ plan: free ออกแล้ว (แก้ไขตาม Error ล่าสุด)
    rootDir: frontend 
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
